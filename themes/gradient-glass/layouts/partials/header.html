<header class="site-header">
  <nav class="nav-container">
    <a href="{{ "/" | relLangURL }}" class="nav-logo">{{ .Site.Title }}</a>
    <div class="nav-links">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relLangURL }}" class="nav-link">{{ .Name }}</a>
      {{ end }}
      {{ partial "language-toggle.html" $ }}
    </div>
    <button class="nav-mobile-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
</header>
