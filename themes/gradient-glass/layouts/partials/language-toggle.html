{{ if .IsTranslated }}
  {{ range .Translations }}
  <a href="{{ .RelPermalink }}" class="lang-toggle" data-no-pjax hreflang="{{ .Lang }}">
    {{ if eq .Lang "en" }}EN{{ else }}中文{{ end }}
  </a>
  {{ end }}
{{ else }}
  {{ if eq .Lang "en" }}
  <a href="{{ "/zh/" | absURL }}" class="lang-toggle" data-no-pjax>中文</a>
  {{ else }}
  <a href="{{ "/en/" | absURL }}" class="lang-toggle" data-no-pjax>EN</a>
  {{ end }}
{{ end }}
